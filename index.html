<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>You Matter 💜</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    * { box-sizing: border-box; font-family: "Segoe UI", system-ui, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2a1f3d, #120d1f);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    /* 🌸 Floating flowers */
    .bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bg span {
      position: absolute;
      bottom: -40px;
      font-size: 20px;
      opacity: 0.25;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(0); }
      to { transform: translateY(-120vh); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      width: 95%;
      max-width: 520px;
      padding: 28px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    h1 { margin: 0; color: #e6ccff; }

    /* 🌍 Planet */
    .planet-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 18px auto;
    }

    .planet {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, #d8b4fe, #a855f7);
      box-shadow: 0 0 25px rgba(168,85,247,0.6);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(168,85,247,0.9); }
    }

    /* orbit petals */
    .orbit {
      position: absolute;
      inset: 0;
      animation: rotate 8s linear infinite;
    }

    .orbit span {
      position: absolute;
      font-size: 14px;
    }

    .orbit span:nth-child(1) { top: 0; left: 50%; }
    .orbit span:nth-child(2) { bottom: 0; left: 50%; }
    .orbit span:nth-child(3) { left: 0; top: 50%; }
    .orbit span:nth-child(4) { right: 0; top: 50%; }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .bubble {
      margin-top: 10px;
      padding: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      line-height: 1.6;
      animation: fade 0.4s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .choices {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .btn.correct {
      background: #a855f7;
    }

    /* ✨ sparkles */
    .sparkle {
      position: absolute;
      font-size: 14px;
      animation: sparkle 1s ease forwards;
    }

    @keyframes sparkle {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-40px) scale(1.5); }
    }

    .final {
      margin-top: 12px;
      line-height: 1.6;
      display: none;
    }
  </style>
</head>

<body>

  <div class="bg" id="bg"></div>

  <div class="card">
    <h1>Hey 💜</h1>

    <div class="planet-wrap">
      <div class="planet" id="planet"></div>
      <div class="orbit">
        <span>🌸</span>
        <span>🌸</span>
        <span>🌸</span>
        <span>🌸</span>
      </div>
    </div>

    <div id="bubble" class="bubble"></div>
    <div id="choices" class="choices"></div>
    <div id="final" class="final"></div>
  </div>

  <script>
    // 🌷 floating flowers
    const bg = document.getElementById("bg");
    const flowers = ["🌷","🌸","🌼","🌺"];

    for (let i = 0; i < 18; i++) {
      const f = document.createElement("span");
      f.textContent = flowers[Math.floor(Math.random()*flowers.length)];
      f.style.left = Math.random()*100 + "%";
      f.style.animationDuration = (10 + Math.random()*8) + "s";
      f.style.animationDelay = Math.random()*6 + "s";
      bg.appendChild(f);
    }

    const steps = [
      {
        q: "What matters more to me?",
        options: ["Being right", "How you feel"],
        correct: 1,
        msg: "How you feel matters to me more than being right."
      },
      {
        q: "What should I focus on?",
        options: ["My pride", "What we have"],
        correct: 1,
        msg: "What we have means a lot to me — more than my pride ever will."
      },
      {
        q: "What should I do more of?",
        options: ["Brush things off", "Listen properly"],
        correct: 1,
        msg: "I want to listen to you properly, not just react."
      },
      {
        q: "What matters most to me?",
        options: ["Winning", "You"],
        correct: 1,
        msg: "You matter to me more than anything else here."
      }
    ];

    const finalMessage = `
      I don’t always express it perfectly, but you are important to me.
      <br><br>
      Not occasionally. Not when it’s easy. Always.
      <br><br>
      What you feel, what you think, and what we have —
      all of it matters to me more than I sometimes show.
    `;

    let i = 0;

    const bubble = document.getElementById("bubble");
    const choices = document.getElementById("choices");
    const final = document.getElementById("final");
    const planet = document.getElementById("planet");

    function sparkle() {
      for (let j = 0; j < 6; j++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.textContent = "✨";
        s.style.left = (45 + Math.random()*10) + "%";
        s.style.top = "50%";
        document.body.appendChild(s);

        setTimeout(() => s.remove(), 1000);
      }
    }

    function render() {
      if (i >= steps.length) {
        bubble.style.display = "none";
        choices.style.display = "none";
        final.style.display = "block";
        final.innerHTML = finalMessage;
        return;
      }

      const step = steps[i];
      bubble.textContent = step.q;
      choices.innerHTML = "";

      step.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = opt;

        btn.onclick = () => {
          if (index === step.correct) {
            btn.classList.add("correct");
            bubble.textContent = step.msg;
            planet.style.transform = "scale(1.15)";
            sparkle();

            setTimeout(() => {
              planet.style.transform = "";
              i++;
              render();
            }, 1200);
          }
        };

        choices.appendChild(btn);
      });
    }

    render();
  </script>

</body>
</html>
